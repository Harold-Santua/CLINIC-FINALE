<body>
    <h1>Booking Page</h1>
    <p>You successfully selected a doctor!</p>

    <div class="header">
        <h2>CLINIC APPOINTMENT</h2>
        <div class="nav">
            <a routerLink="/patient">ABOUT</a>
            <a routerLink="/doctor">DOCTOR</a>
            <a routerLink="/patient">BOOKING</a>
        </div>
    </div>

    <h2>BOOKING PAGE</h2>

    <table border="1" width="100%">
        <tr>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Time</th>
        </tr>

        <tr *ngFor="let appt of appointments">
            <td>{{ appt.name }}</td>
            <td>{{ appt.doctor }}</td>
            <td>{{ appt.time }}</td>
        </tr>
    </table>
</body>
